<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning PDF to Audio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #43cea2, #185a9d);
            font-family: 'Poppins', sans-serif;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            margin-top: 50px;
        }
        h2 {
            text-align: center;
            color: #185a9d;
            font-weight: bold;
        }
        .btn-primary {
            width: 100%;
            background: #185a9d;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #43cea2;
            color: white;
        }
        #pdfViewer {
            border: 1px solid #ddd;
            padding: 10px;
            background: white;
            height: 400px;
            overflow: auto;
            border-radius: 8px;
        }
        input[type="file"] {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>E-Learning PDF to Audio</h2>
        <p class="text-center text-muted">Convert your PDF text to high-quality speech effortlessly.</p>
        <div class="mb-3">
            <label class="form-label fw-bold">Upload PDF</label>
            <input type="file" id="pdfFile" class="form-control" accept="application/pdf">
        </div>
        <div id="pdfViewer"></div>
        <button class="btn btn-primary mt-3" onclick="generateAudio()">Generate Audio</button>
        <audio id="audioPlayer" class="mt-3 w-100" controls hidden></audio>
    </div>
    
    <script>
        let selectedPDF = null;
        document.getElementById('pdfFile').addEventListener('change', function(event) {
            selectedPDF = event.target.files[0];
            if (selectedPDF) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    renderPDF(e.target.result);
                    encodePDFToBase64(selectedPDF);
                };
                reader.readAsDataURL(selectedPDF);
            }
        });

        function renderPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            loadingTask.promise.then(pdf => {
                let viewer = document.getElementById('pdfViewer');
                viewer.innerHTML = "";
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    pdf.getPage(pageNum).then(page => {
                        let canvas = document.createElement("canvas");
                        let context = canvas.getContext("2d");
                        viewer.appendChild(canvas);
                        let viewport = page.getViewport({ scale: 1.5 });
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        page.render({ canvasContext: context, viewport: viewport });
                    });
                }
            });
        }

        function encodePDFToBase64(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedPDF.base64 = event.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        function generateAudio() {
            if (!selectedPDF || !selectedPDF.base64) {
                alert("Please upload a PDF first.");
                return;
            }
            const requestData = {
                pdf_base64: selectedPDF.base64,
                language: "english",
                gender: "male",
                alpha: "1"
            };
            fetch("http://127.0.0.1:5000/generate_audio", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.audio_url) {
                    const audioPlayer = document.getElementById("audioPlayer");
                    audioPlayer.src = "http://127.0.0.1:5000" + data.audio_url;
                    audioPlayer.hidden = false;
                } else {
                    alert("Failed to generate audio.");
                }
            })
            .catch(error => console.error("Error:", error));
        }
    </script>
</body>
</html>
